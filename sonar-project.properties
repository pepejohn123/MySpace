# ── Identity ──────────────────────────────────────────────────────────────────
sonar.projectKey=myspace-condominio
sonar.projectName=MySpace Condominio
sonar.organization=YOUR_SONARCLOUD_ORG_KEY   # replace with your org slug from sonarcloud.io

# ── Sources (frontend only) ───────────────────────────────────────────────────
sonar.sources=Develop 2/frontend

# Only analyze browser JS — Lambda .mjs files are managed on AWS directly
sonar.inclusions=Develop 2/frontend/js/**/*.js

# Exclude everything that isn't active frontend code
sonar.exclusions=\
  Develop 2/frontend/lambda-tests/**,\
  Develop 2/frontend/*.mjs,\
  Develop 2/frontend/Propuestas/**,\
  Develop 2/frontend/css/**,\
  Develop 2/frontend/pages/**

# ── Browser JS environment ────────────────────────────────────────────────────
sonar.javascript.environments=browser

# ── No test coverage report ───────────────────────────────────────────────────
sonar.coverage.exclusions=**/*

# ── Encoding ──────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
