version: 1
frontend:
  phases:
    preBuild:
      commands:
        # ── ESLint: JS quality check ───────────────────────────────────────
        # Pinned to v8 (v9 removed the --env CLI flag).
        # Globals declared here are functions/objects shared across script tags
        # or loaded from CDN — ESLint can't see those, so we tell it they exist.
        # || true = findings are logged but never block the deploy.
        - npm install -g eslint@8 --silent
        - eslint "Develop 2/frontend/js/**/*.js"
            --env browser --env es2021
            --rule '{"no-undef":"error","no-unused-vars":"warn"}'
            --global getToken --global getRole --global getUser
            --global saveSession --global logout --global requireAuth
            --global apiGet --global apiPost --global apiPatch --global apiDelete
            --global API_BASE_URL
            --global showFeedback --global setLoadingState --global setButtonLoadingState
            --global AmazonCognitoIdentity --global Stripe --global QRCode --global jsQR
            --global ResidentStore --global ResidentShared
            --global ResidentHomeScreen --global ResidentTicketsScreen
            --global ResidentPaymentsScreen --global ResidentReservationsScreen
            --global ResidentVisitsScreen --global ResidentNoticesScreen
            --global mapAwsPropertyToCard --global buildPropertyStatusClass
            --global changeTab --global exportConfigByTab --global descargarExcel
            --global validarVisitaPorCodigo --global renderVisitValidationResult
            --global cargarTickets --global cargarTicketsCerradosRecientes
            --global cargarAvisos --global cargarAvisosArchivados
            --global cargarAmenidades --global cargarReservas --global cargarPropiedades
            --global cargarTicketsDesdeApi --global cargarAvisosDesdeApi
            --global cargarVisitasDesdeApi --global cargarPagosDesdeApi
            --global cargarReservasDesdeApi --global cargarAmenidadesDesdeApi
            --global cargarPropiedadesDesdeApi
            --global actualizarHistorialTickets --global actualizarVistaVisitas
            --global actualizarVistaFinanzas
            --global bindPropertyFilters --global openPropertyFormModal
            --global amenityModalMode --global selectedAmenityId
            --global actualizarAmenidad --global crearAmenidad
            --global crearAviso --global closeAmenityModal --global closeNoticeModal
            --global getTicketPriorityClass --global getSelectedAmenitySlots
            --global visitsCache --global propertiesCache
            --global reservationsAmenitiesCache --global paymentsFinanzasCache
            --global ticketsHistoryCache --global financeShellRendered
            || true

        # ── html-validate: HTML structure check ───────────────────────────
        # Catches malformed HTML, missing alt attributes, broken element nesting.
        # || true = informational only, never blocks deploy.
        - npm install -g html-validate --silent
        - html-validate "Develop 2/frontend/**/*.html" || true

        # ── Stylelint: CSS quality check ──────────────────────────────────
        # || true = informational only, never blocks deploy.
        - npm install -g stylelint stylelint-config-standard --silent
        - stylelint "Develop 2/frontend/css/**/*.css"
            --config '{"extends":["stylelint-config-standard"]}'
            || true

    build:
      commands:
        - echo "Static frontend — no build step needed"
        - test -f "Develop 2/frontend/index.html"

  artifacts:
    baseDirectory: "Develop 2/frontend"
    files:
      - "**/*"

  customHeaders:
    - pattern: '**/*.js'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, must-revalidate'
    - pattern: '**/*.css'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, must-revalidate'
    - pattern: '**/*.html'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, must-revalidate'
