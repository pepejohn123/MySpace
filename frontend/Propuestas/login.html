<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySpace - Acceso</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --brand: #4F46E5; --brand-dark: #4338ca; --text-main: #111827; --text-light: #6B7280; --bg-input: #F3F4F6; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .split-screen { display: flex; width: 100%; height: 100%; }
        .left-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 80px; background: white; max-width: 500px; }
        .right-panel { flex: 1.5; background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80'); background-size: cover; background-position: center; position: relative; }
        .right-panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.7)); }
        .quote-container { position: absolute; bottom: 60px; left: 60px; color: white; z-index: 2; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--brand); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        h1 { font-size: 2rem; color: var(--text-main); margin-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.9rem; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .input-field { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid transparent; background: var(--bg-input); font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        .input-field:focus { background: white; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--brand); color: white; margin-bottom: 20px; }
        .btn-primary:hover { background: var(--brand-dark); transform: translateY(-2px); }
        .divider { display: flex; align-items: center; text-align: center; margin: 0 0 20px 0; color: var(--text-light); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #E5E7EB; }
        .btn-google { background: white; border: 1px solid #E5E7EB; color: var(--text-main); display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Simulación de Loading */
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--brand); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) { .right-panel { display: none; } .left-panel { padding: 40px; width: 100%; max-width: 100%; } }
    </style>
</head>
<body>
    <div class="split-screen">
        <div class="left-panel">
            <div class="logo"><i class="fa-solid fa-city"></i> MySpace</div>
            <h1>Bienvenido</h1>
            <p style="color: var(--text-light); margin-bottom: 35px;">Tu comunidad, gestionada en un solo lugar.</p>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="emailInput" class="input-field" placeholder="admin@condo.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" class="input-field" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span id="btnText">Iniciar Sesión</span>
                    <div class="loader" id="loader"></div>
                </button>
                <div class="divider">o continúa con</div>
                <button type="button" class="btn btn-google" onclick="handleLoginGoogle()">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" alt="Google"> Google
                </button>
            </form>
        </div>
        <div class="right-panel">
            <div class="quote-container">
                <h2 style="font-size: 2.2rem; font-weight: 700;">Gestión simple,<br>vida tranquila.</h2>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.toLowerCase();
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            // Efecto visual de carga
            btnText.innerText = "Verificando...";
            loader.style.display = "inline-block";

            setTimeout(() => {
                if (email.includes('admin')) {
                    window.location.href = 'admin.html'; // Redirige al Dashboard Admin
                } else {
                    window.location.href = 'residente.html'; // Redirige al Dashboard Residente
                }
            }, 1000);
        }

        function handleLoginGoogle() {
            // Simulamos que Google loguea a un residente por defecto
            window.location.href = 'residente.html';
        }
    </script>
</body>
</html>
