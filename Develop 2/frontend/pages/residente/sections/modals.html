<div id="modal-falla" class="modal-overlay" onclick="closeModal(event, this)">
  <div class="modal-card">
    <h3 class="modal-heading">Reportar Falla</h3>
    <form id="ticketForm" class="modal-form">
      <input id="ticketTitle" class="modal-input" type="text" placeholder="Título del problema" required />
      <textarea id="ticketDescription" class="modal-textarea" placeholder="Describe la falla" rows="4" required></textarea>
      <div id="ticket-feedback" class="modal-feedback"></div>
      <button type="submit" class="modal-submit-btn">
        Enviar reporte
      </button>
    </form>
  </div>
</div>

<div id="modal-pago" class="modal-overlay" onclick="closeModal(event, this)">
  <div class="modal-card">
    <h3 class="modal-heading">Pagar Cuota</h3>

    <!-- Step 0: payment type selection -->
    <div id="stripe-step-0">
      <p class="resident-payment-helper">¿Qué deseas pagar?</p>
      <div class="payment-type-grid">
        <button type="button" class="payment-type-btn" id="pay-rent-btn">
          <i class="fa-solid fa-house"></i>
          <span>Renta</span>
          <small id="pay-rent-amount-label">Cargando...</small>
        </button>
        <button type="button" class="payment-type-btn" id="pay-service-btn">
          <i class="fa-solid fa-wrench"></i>
          <span>Servicio / Otro</span>
          <small>Ingresa el monto</small>
        </button>
      </div>
    </div>

    <!-- Step 1: concept + amount (services only) -->
    <div id="stripe-step-1" style="display:none;">
      <div class="stripe-step2-header">
        <button type="button" class="stripe-back-btn" id="stripe-step1-back-btn">
          <i class="fa-solid fa-arrow-left"></i> Volver
        </button>
      </div>
      <p class="resident-payment-helper">Indica el concepto y monto de tu pago.</p>
      <form id="paymentForm" class="modal-form">
        <input id="paymentConcept" class="modal-input" type="text" placeholder="Ej. Cuota de mantenimiento mayo 2026" required />
        <input id="paymentAmount" class="modal-input" type="number" min="1" step="0.01" placeholder="Monto del pago (MXN)" required />
        <div id="payment-feedback" class="modal-feedback"></div>
        <button type="submit" class="modal-submit-btn">Continuar al pago</button>
      </form>
    </div>

    <!-- Step 2: Stripe card element -->
    <div id="stripe-step-2" style="display:none;">
      <div class="stripe-step2-header">
        <button type="button" class="stripe-back-btn" id="stripe-back-btn">
          <i class="fa-solid fa-arrow-left"></i> Volver
        </button>
        <p class="resident-payment-helper" id="stripe-payment-summary"></p>
      </div>
      <div id="stripe-payment-element"></div>
      <div id="stripe-error-message" class="modal-feedback error" style="display:none;"></div>
      <button type="button" class="modal-submit-btn" id="stripe-pay-btn" style="margin-top:16px;">
        <i class="fa-solid fa-lock"></i> Pagar ahora
      </button>
      <p class="stripe-secure-note"><i class="fa-solid fa-shield-halved"></i> Pago procesado de forma segura por Stripe</p>
    </div>
  </div>
</div>

<div id="modal-reserva" class="modal-overlay" onclick="closeModal(event, this)">
  <div class="modal-card">
    <h3 class="modal-heading">Solicitar Reserva</h3>
    <form id="reservationForm" class="modal-form">
      <select id="reservationAmenityId" class="modal-input" required>
        <option value="">Selecciona una amenidad</option>
      </select>
      <input id="reservationDate" class="modal-input" type="date" required />
      <select id="reservationTimeSlot" class="modal-input" required>
        <option value="">Selecciona un horario</option>
      </select>
      <div id="reservation-slots-feedback" class="modal-feedback"></div>
      <div id="reservation-feedback" class="modal-feedback"></div>
      <button type="submit" class="modal-submit-btn">
        Solicitar reserva
      </button>
    </form>
  </div>
</div>

<div id="modal-visita" class="modal-overlay" onclick="closeModal(event, this)">
  <div class="modal-card">
    <h3 class="modal-heading">Generar Pase de Visita</h3>
    <form id="visitForm" class="modal-form">
      <input id="visitVisitorName" class="modal-input" type="text" placeholder="Nombre del visitante" required />
      <input id="visitDate" class="modal-input" type="date" required />
      <div id="visit-feedback" class="modal-feedback"></div>
      <button type="submit" class="modal-submit-btn">
        Generar pase
      </button>
    </form>
    <div id="visit-result" class="visit-result"></div>
  </div>
</div>
