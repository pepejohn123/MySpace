<div class="admin-hidden property-filters-section" id="property-filters-wrapper">
  <div class="property-filters">
    <input id="property-name-filter" class="modal-input" type="text" placeholder="Buscar por nombre o ID" />
    <select id="property-status-filter" class="modal-input">
      <option value="all">Todos los estados</option>
      <option value="disponible">Disponible</option>
      <option value="ocupada">Ocupada</option>
      <option value="mantenimiento">Mantenimiento</option>
      <option value="inactiva">Inactiva</option>
    </select>
    <select id="property-building-filter" class="modal-input">
      <option value="all">Todos los edificios</option>
    </select>
    <select id="property-resident-filter" class="modal-input">
      <option value="all">Todas las asignaciones</option>
      <option value="assigned">Con residente</option>
      <option value="unassigned">Sin residente</option>
    </select>
  </div>
</div>

<div class="grid" id="propiedades-container"></div>

<div
  id="property-detail-modal"
  class="modal-overlay"
  onclick="closePropertyDetail(event, this)"
>
  <div class="modal-box property-detail-modal">
    <span class="close-btn" onclick="closePropertyDetailModal()"
      >&times;</span
    >
    <div id="property-detail-content">
      <div class="loading-state">Cargando detalle de propiedad...</div>
    </div>
  </div>
</div>

<div
  id="property-form-modal"
  class="modal-overlay"
  onclick="closePropertyFormModal(event, this)"
>
  <div class="modal-box property-detail-modal">
    <span class="close-btn" onclick="closePropertyFormModal()"
      >&times;</span
    >
    <h3 class="property-detail-title" id="property-form-title">
      Nueva propiedad
    </h3>
    <form id="property-form" class="modal-form" onsubmit="handlePropertyFormSubmit(event)">
      <div class="admin-form-grid">
        <label class="admin-field admin-field-full">
          <span>Nombre de la propiedad</span>
          <input
            id="property-form-name"
            class="modal-input"
            type="text"
            placeholder="Ej. Casa 08 - Roble"
            required
          />
        </label>
        <label class="admin-field">
          <span>Edificio / sección</span>
          <input
            id="property-form-building"
            class="modal-input"
            type="text"
            placeholder="Ej. Torre A"
          />
        </label>
        <label class="admin-field">
          <span>Estado</span>
          <select id="property-form-status" class="modal-input">
            <option value="disponible">Disponible</option>
            <option value="ocupada">Ocupada</option>
            <option value="mantenimiento">Mantenimiento</option>
            <option value="inactiva">Inactiva</option>
          </select>
        </label>
        <label class="admin-field">
          <span>Renta mensual (MXN)</span>
          <input
            id="property-form-rent"
            class="modal-input"
            type="number"
            min="0"
            step="0.01"
            placeholder="Ej. 8500"
          />
          <small class="admin-field-hint">Monto fijo que el residente verá al pagar su renta.</small>
        </label>
      </div>
      <div class="modal-actions-row">
        <button
          type="button"
          class="admin-secondary-btn"
          onclick="closePropertyFormModal()"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="admin-action-btn"
          id="property-form-submit-btn"
        >
          Guardar propiedad
        </button>
      </div>
    </form>
  </div>
</div>

<div
  id="assign-resident-modal"
  class="modal-overlay"
  onclick="closeAssignResidentModal(event, this)"
>
  <div class="modal-box property-detail-modal">
    <span class="close-btn" onclick="closeAssignResidentModal()"
      >&times;</span
    >
    <h3 class="property-detail-title">Asignar residente</h3>
    <form id="assign-resident-form" class="modal-form">
      <input id="assign-resident-property-id" type="hidden" />
      <label class="admin-field admin-field-full">
        <span>ID del residente</span>
        <select
          id="assign-resident-id"
          class="modal-input"
          required
        >
          <option value="">Cargando residentes...</option>
        </select>
      </label>
      <div class="modal-actions-row">
        <button
          type="button"
          class="admin-secondary-btn"
          onclick="closeAssignResidentModal()"
        >
          Cancelar
        </button>
        <button
          class="admin-secondary-btn"
          onclick="confirmarAsignacionResidente(event)"
        >
          Asignar Residente
        </button>
      </div>
    </form>
  </div>
</div>

<div id="create-resident-modal" class="modal-overlay" onclick="closeCreateResidentModal(event, this)">
  <div class="modal-box property-detail-modal">
    <span class="close-btn" onclick="closeCreateResidentModal()">&times;</span>
    <h3 class="property-detail-title">
      <i class="fa-solid fa-user-plus" style="color:var(--brand)"></i> Nuevo Residente
    </h3>
    <form id="create-resident-form" class="modal-form" onsubmit="handleCreateResidentSubmit(event)">
      <div class="admin-form-grid">
        <label class="admin-field admin-field-full">
          <span>Nombre completo</span>
          <input id="create-resident-name" class="modal-input" type="text" placeholder="Nombre del residente" required />
        </label>
        <label class="admin-field admin-field-full">
          <span>Correo electrónico</span>
          <input id="create-resident-email" class="modal-input" type="email" placeholder="correo@ejemplo.com" required />
        </label>
        <label class="admin-field">
          <span>Rol</span>
          <select id="create-resident-role" class="modal-input">
            <option value="residente">Residente</option>
            <option value="guardia">Guardia</option>
          </select>
        </label>
        <label class="admin-field admin-field-full">
          <span>Ventana de pago</span>
          <div class="payment-window-row">
            <span>Días del</span>
            <input id="create-resident-payment-start" class="modal-input payment-day-input" type="number" min="1" max="28" placeholder="1" />
            <span>al</span>
            <input id="create-resident-payment-end" class="modal-input payment-day-input" type="number" min="1" max="28" placeholder="5" />
            <span>de cada mes</span>
          </div>
          <small class="admin-field-hint">Días del mes en los que el residente puede realizar su pago. Si no aplica, deja en blanco.</small>
        </label>
      </div>
      <div id="create-resident-feedback" class="modal-feedback"></div>
      <div class="modal-actions-row">
        <button type="button" class="admin-secondary-btn" onclick="closeCreateResidentModal()">Cancelar</button>
        <button type="submit" class="admin-action-btn" id="create-resident-submit-btn">Crear residente</button>
      </div>
    </form>
  </div>
</div>
