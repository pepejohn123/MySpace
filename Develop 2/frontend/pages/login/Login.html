<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySpace - Acceso</title>
    <link rel="stylesheet" href="../../css/Global.css">
    <link rel="stylesheet" href="../../css/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="split-screen">
  <div class="left-panel">
    <div class="logo">
      <i class="fa-solid fa-city"></i> MySpace
    </div>

    <h1>Bienvenido</h1>
    <p class="subtitle">Tu comunidad, gestionada en un solo lugar.</p>

    <form id="loginForm">
      <div class="input-group">
        <label>Correo Electrónico</label>
        <input type="email" id="emailInput" class="input-field" placeholder="Correo@gmail.com" required>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" class="input-field" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary">
        <span id="btnText">Iniciar Sesión</span>
        <div class="loader" id="loader"></div>
      </button>

      <div id="login-feedback" class="login-feedback"></div>

      <button type="button" id="forgotPasswordLink" class="btn-link">¿Olvidaste tu contraseña?</button>
    </form>

    <!-- Forgot / first-login password panel (hidden by default) -->
    <div id="forgotPasswordPanel" style="display:none">

      <!-- Step 1: enter email to receive code -->
      <div id="forgot-step-1">
        <p class="subtitle">Te enviaremos un código de verificación a tu correo.</p>
        <div class="input-group">
          <label for="forgotEmailInput">Correo Electrónico</label>
          <input type="email" id="forgotEmailInput" class="input-field" placeholder="Correo@gmail.com">
        </div>
        <button type="button" id="sendCodeBtn" class="btn btn-primary">Enviar código</button>
        <div id="forgot-feedback-1" class="login-feedback"></div>
      </div>

      <!-- Step 2: enter code + new password -->
      <div id="forgot-step-2" style="display:none">
        <p class="subtitle" id="forgot-step-2-msg">Ingresa el código que recibiste y tu nueva contraseña.</p>
        <div class="input-group" id="code-group">
          <label for="verificationCode">Código de verificación</label>
          <input type="text" id="verificationCode" class="input-field" placeholder="123456" autocomplete="one-time-code">
        </div>
        <div class="input-group">
          <label for="newPasswordInput">Nueva contraseña</label>
          <input type="password" id="newPasswordInput" class="input-field" placeholder="••••••••">
        </div>
        <button type="button" id="confirmPasswordBtn" class="btn btn-primary">Confirmar contraseña</button>
        <div id="forgot-feedback-2" class="login-feedback"></div>
      </div>

      <button type="button" id="backToLoginBtn" class="btn-link">← Volver al inicio de sesión</button>
    </div>
  </div>

  <div class="right-panel"></div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.9/dist/amazon-cognito-identity.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/ui.js"></script>
    <script src="../../js/Login.js"></script>
</body>
</html>
